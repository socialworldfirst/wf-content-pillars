<script>
const LS_KEY="wf_pw";
function b64(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function dkey(pw,salt,it){const e=new TextEncoder();const bk=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]);
 return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:it,hash:"SHA-256"},bk,{name:"AES-GCM",length:256},false,["decrypt"]);}
async function dec(pw){const b=JSON.parse(document.getElementById('pw-payload').textContent);
 const k=await dkey(pw,b64(b.salt),b.iterations);const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(b.iv)},k,b64(b.ciphertext));
 return new TextDecoder().decode(p);}
let _revealed=false;
function reveal(html){if(_revealed)return;_revealed=true;const c=document.getElementById('pw-content');c.innerHTML=html;c.hidden=false;
 c.querySelectorAll('script').forEach(o=>{const s=document.createElement('script');if(o.src)s.src=o.src;else s.textContent=o.textContent;o.replaceWith(s);});
 document.getElementById('pw-gate').style.display='none';document.body.classList.remove('locked');}
async function gateSubmit(e){e.preventDefault();const i=document.getElementById('pw-gate-input'),er=document.getElementById('pw-gate-err');er.textContent='';
 try{reveal(await dec(i.value));try{localStorage.setItem(LS_KEY,i.value);}catch(_){} }catch(_){er.textContent='wrong password';i.value='';i.focus();}return false;}
(async()=>{try{const c=localStorage.getItem(LS_KEY);if(c)reveal(await dec(c));}catch(_){try{localStorage.removeItem(LS_KEY);}catch(_){}}})();
</script></body></html>
